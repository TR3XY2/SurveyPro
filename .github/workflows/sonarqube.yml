on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

name: Sonar Workflow
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    permissions:
      pull-requests: write
      contents: read
      checks: write

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: SonarCloud begin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
         ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"SurveyProApp_SurveyPro" /o:"surveyproapp" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="src/SurveyPro.Tests/TestResults/coverage.opencover.xml" /d:sonar.coverage.exclusions="**/Migrations/**,**/wwwroot/**"

      - name: Restore and Build
        run: |
          dotnet restore SurveyPro.sln
          dotnet build SurveyPro.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test SurveyPro.sln --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: SonarCloud end
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Publish app
        run: dotnet publish SurveyPro.sln -c Release -o publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: surveypro
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
      
